openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 建設業向け原価管理クラウドシステム API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: 工事管理
  - name: cost-items
    description: 原価入力
  - name: budgets
    description: 予算管理
  - name: budget-items
    description: 実行予算明細
  - name: dashboard
    description: ダッシュボード・集計

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: 工事一覧取得
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [planning, active, completed, suspended]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 工事一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: 工事登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: 工事登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: 工事詳細取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 工事詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: 工事更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: 工事更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: 工事削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

  /projects/{id}/summary:
    get:
      operationId: getProjectSummary
      tags: [projects]
      summary: 工事収支サマリ取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 工事収支サマリ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"

  /cost-items:
    get:
      operationId: listCostItems
      tags: [cost-items]
      summary: 原価項目一覧取得
      parameters:
        - in: query
          name: projectId
          required: true
          schema:
            type: integer
        - in: query
          name: category
          schema:
            type: string
            enum: [material, labor, subcontract, expense]
      responses:
        "200":
          description: 原価項目一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItemListResponse"
    post:
      operationId: createCostItem
      tags: [cost-items]
      summary: 原価項目登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCostItemRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"

  /cost-items/{id}:
    put:
      operationId: updateCostItem
      tags: [cost-items]
      summary: 原価項目更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCostItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"
    delete:
      operationId: deleteCostItem
      tags: [cost-items]
      summary: 原価項目削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

  /budgets:
    get:
      operationId: listBudgets
      tags: [budgets]
      summary: 予算一覧取得
      parameters:
        - in: query
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 予算一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetListResponse"
    post:
      operationId: createBudget
      tags: [budgets]
      summary: 予算登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /budgets/{id}:
    put:
      operationId: updateBudget
      tags: [budgets]
      summary: 予算更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBudgetRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /projects/{id}/budget-items:
    get:
      operationId: listBudgetItems
      tags: [budget-items]
      summary: 実行予算明細一覧取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 実行予算明細一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetItemListResponse"
    post:
      operationId: createBudgetItem
      tags: [budget-items]
      summary: 実行予算明細登録
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetItemRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetItem"

  /projects/{id}/budget-items/{itemId}:
    put:
      operationId: updateBudgetItem
      tags: [budget-items]
      summary: 実行予算明細更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBudgetItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBudgetItem
      tags: [budget-items]
      summary: 実行予算明細削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [dashboard]
      summary: ダッシュボード概要取得
      responses:
        "200":
          description: ダッシュボード概要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /dashboard/cost-by-category:
    get:
      operationId: getCostByCategory
      tags: [dashboard]
      summary: カテゴリ別原価集計
      parameters:
        - in: query
          name: projectId
          schema:
            type: integer
      responses:
        "200":
          description: カテゴリ別原価
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostByCategoryResponse"

  /dashboard/monthly-costs:
    get:
      operationId: getMonthlyCosts
      tags: [dashboard]
      summary: 月別原価推移取得
      parameters:
        - in: query
          name: projectId
          schema:
            type: integer
        - in: query
          name: year
          schema:
            type: integer
      responses:
        "200":
          description: 月別原価推移
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyCostsResponse"

  /dashboard/budget-vs-actual:
    get:
      operationId: getBudgetVsActual
      tags: [dashboard]
      summary: 予算実績対比取得
      parameters:
        - in: query
          name: projectId
          schema:
            type: integer
      responses:
        "200":
          description: 予算実績対比
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetVsActualResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
      required:
        - message

    Project:
      type: object
      properties:
        id:
          type: integer
        projectCode:
          type: string
          description: 工事番号
        name:
          type: string
          description: 工事名称
        clientName:
          type: string
          description: 発注者名
        location:
          type: string
          description: 工事場所
        contractAmount:
          type: number
          description: 請負金額（円）
        status:
          type: string
          enum: [planning, active, completed, suspended]
          description: 工事状態
        startDate:
          type: string
          format: date
          description: 着工日
        endDate:
          type: string
          format: date
          description: 竣工予定日
        completedDate:
          type: string
          format: date
          nullable: true
          description: 竣工日
        description:
          type: string
          nullable: true
          description: 備考
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shortName:
          type: string
          nullable: true
          description: 工事略称
        estimateNumber:
          type: string
          nullable: true
          description: 見積番号
        orderType:
          type: string
          nullable: true
          description: 受注区分（元請/下請 等）
        orderDate:
          type: string
          format: date
          nullable: true
          description: 受注日
        taxRate:
          type: number
          nullable: true
          description: 消費税率（%）
        taxExcludedAmount:
          type: number
          nullable: true
          description: 税抜金額
        taxAmount:
          type: number
          nullable: true
          description: 消費税額
        taxIncludedAmount:
          type: number
          nullable: true
          description: 税込金額
        overview:
          type: string
          nullable: true
          description: 工事概要
        department:
          type: string
          nullable: true
          description: 工事部門
        salesStaff:
          type: string
          nullable: true
          description: 営業担当
        siteManager:
          type: string
          nullable: true
          description: 工事担当
        category1:
          type: string
          nullable: true
          description: 工事分類1
        category2:
          type: string
          nullable: true
          description: 工事分類2
        category3:
          type: string
          nullable: true
          description: 工事分類3
        handoverDate:
          type: string
          format: date
          nullable: true
          description: 引渡予定日
        progressRate:
          type: integer
          nullable: true
          description: 進捗率（%）
        recognitionBasis:
          type: string
          nullable: true
          description: 計上基準
        projectCodeBranch:
          type: string
          nullable: true
          description: 工事コード枝番
        startDateActual:
          type: string
          format: date
          nullable: true
          description: 着工日（実施）
        endDateActual:
          type: string
          format: date
          nullable: true
          description: 竣工日（実施）
        handoverDateActual:
          type: string
          format: date
          nullable: true
          description: 引渡日（実施）
        floorAreaTsubo:
          type: number
          nullable: true
          description: 床面積（坪）
        floorAreaSqm:
          type: number
          nullable: true
          description: 床面積（㎡）
        memo:
          type: string
          nullable: true
          description: メモ
        isCompleted:
          type: boolean
          nullable: true
          description: 完成フラグ
        contractLines:
          type: array
          nullable: true
          description: 請負金額明細（最大8行）
          items:
            $ref: "#/components/schemas/ContractLine"
      required:
        - id
        - projectCode
        - name
        - clientName
        - location
        - contractAmount
        - status
        - startDate
        - endDate
        - createdAt
        - updatedAt

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            totalBudget:
              type: number
              description: 予算合計
            totalActualCost:
              type: number
              description: 実績原価合計
            grossProfit:
              type: number
              description: 粗利額
            grossProfitRate:
              type: number
              description: 粗利率（%）
            costItems:
              type: array
              items:
                $ref: "#/components/schemas/CostItem"
            budgets:
              type: array
              items:
                $ref: "#/components/schemas/Budget"
          required:
            - totalBudget
            - totalActualCost
            - grossProfit
            - grossProfitRate
            - costItems
            - budgets

    ProjectListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ProjectListItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - items
        - total
        - page
        - limit

    ProjectListItem:
      type: object
      properties:
        id:
          type: integer
        projectCode:
          type: string
        name:
          type: string
        clientName:
          type: string
        contractAmount:
          type: number
        status:
          type: string
          enum: [planning, active, completed, suspended]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        totalBudget:
          type: number
        totalActualCost:
          type: number
        budgetUsageRate:
          type: number
          description: 予算消化率（%）
        grossProfitRate:
          type: number
          description: 粗利率（%）
      required:
        - id
        - projectCode
        - name
        - clientName
        - contractAmount
        - status
        - startDate
        - endDate
        - totalBudget
        - totalActualCost
        - budgetUsageRate
        - grossProfitRate

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: integer
        contractAmount:
          type: number
        totalBudget:
          type: number
        totalActualCost:
          type: number
        grossProfit:
          type: number
        grossProfitRate:
          type: number
        budgetUsageRate:
          type: number
        costBreakdown:
          type: object
          properties:
            material:
              type: number
            labor:
              type: number
            subcontract:
              type: number
            expense:
              type: number
          required:
            - material
            - labor
            - subcontract
            - expense
      required:
        - projectId
        - contractAmount
        - totalBudget
        - totalActualCost
        - grossProfit
        - grossProfitRate
        - budgetUsageRate
        - costBreakdown

    CreateProjectRequest:
      type: object
      properties:
        projectCode:
          type: string
        name:
          type: string
        clientName:
          type: string
        location:
          type: string
        contractAmount:
          type: number
        status:
          type: string
          enum: [planning, active, completed, suspended]
          default: planning
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        description:
          type: string
          nullable: true
        shortName:
          type: string
          nullable: true
        estimateNumber:
          type: string
          nullable: true
        orderType:
          type: string
          nullable: true
        orderDate:
          type: string
          format: date
          nullable: true
        taxRate:
          type: number
          nullable: true
        taxExcludedAmount:
          type: number
          nullable: true
        taxAmount:
          type: number
          nullable: true
        taxIncludedAmount:
          type: number
          nullable: true
        overview:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        salesStaff:
          type: string
          nullable: true
        siteManager:
          type: string
          nullable: true
        category1:
          type: string
          nullable: true
        category2:
          type: string
          nullable: true
        category3:
          type: string
          nullable: true
        handoverDate:
          type: string
          format: date
          nullable: true
        progressRate:
          type: integer
          nullable: true
        recognitionBasis:
          type: string
          nullable: true
        projectCodeBranch:
          type: string
          nullable: true
        startDateActual:
          type: string
          format: date
          nullable: true
        endDateActual:
          type: string
          format: date
          nullable: true
        handoverDateActual:
          type: string
          format: date
          nullable: true
        floorAreaTsubo:
          type: number
          nullable: true
        floorAreaSqm:
          type: number
          nullable: true
        memo:
          type: string
          nullable: true
        isCompleted:
          type: boolean
          nullable: true
        contractLines:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ContractLine"
      required:
        - projectCode
        - name
        - clientName
        - location
        - contractAmount
        - startDate
        - endDate

    UpdateProjectRequest:
      type: object
      properties:
        projectCode:
          type: string
        name:
          type: string
        clientName:
          type: string
        location:
          type: string
        contractAmount:
          type: number
        status:
          type: string
          enum: [planning, active, completed, suspended]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        completedDate:
          type: string
          format: date
          nullable: true
        description:
          type: string
          nullable: true
        shortName:
          type: string
          nullable: true
        estimateNumber:
          type: string
          nullable: true
        orderType:
          type: string
          nullable: true
        orderDate:
          type: string
          format: date
          nullable: true
        taxRate:
          type: number
          nullable: true
        taxExcludedAmount:
          type: number
          nullable: true
        taxAmount:
          type: number
          nullable: true
        taxIncludedAmount:
          type: number
          nullable: true
        overview:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        salesStaff:
          type: string
          nullable: true
        siteManager:
          type: string
          nullable: true
        category1:
          type: string
          nullable: true
        category2:
          type: string
          nullable: true
        category3:
          type: string
          nullable: true
        handoverDate:
          type: string
          format: date
          nullable: true
        progressRate:
          type: integer
          nullable: true
        recognitionBasis:
          type: string
          nullable: true
        projectCodeBranch:
          type: string
          nullable: true
        startDateActual:
          type: string
          format: date
          nullable: true
        endDateActual:
          type: string
          format: date
          nullable: true
        handoverDateActual:
          type: string
          format: date
          nullable: true
        floorAreaTsubo:
          type: number
          nullable: true
        floorAreaSqm:
          type: number
          nullable: true
        memo:
          type: string
          nullable: true
        isCompleted:
          type: boolean
          nullable: true
        contractLines:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ContractLine"

    ContractLine:
      type: object
      properties:
        contractDate:
          type: string
          format: date
          nullable: true
        taxExcludedAmount:
          type: number
          nullable: true

    CostItem:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        category:
          type: string
          enum: [material, labor, subcontract, expense]
          description: 原価区分（材料費・労務費・外注費・経費）
        description:
          type: string
          description: 摘要
        vendor:
          type: string
          nullable: true
          description: 取引先
        quantity:
          type: number
          nullable: true
          description: 数量
        unit:
          type: string
          nullable: true
          description: 単位
        unitPrice:
          type: number
          nullable: true
          description: 単価
        amount:
          type: number
          description: 金額
        incurredDate:
          type: string
          format: date
          description: 発生日
        invoiceNumber:
          type: string
          nullable: true
          description: 伝票番号
        notes:
          type: string
          nullable: true
          description: 備考
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - category
        - description
        - amount
        - incurredDate
        - createdAt
        - updatedAt

    CostItemListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CostItem"
        total:
          type: integer
        totalAmount:
          type: number
      required:
        - items
        - total
        - totalAmount

    CreateCostItemRequest:
      type: object
      properties:
        projectId:
          type: integer
        category:
          type: string
