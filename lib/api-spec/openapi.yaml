openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: 建設業向け原価管理クラウドシステム API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: 工事管理
  - name: cost-items
    description: 原価入力
  - name: budgets
    description: 予算管理
  - name: budget-items
    description: 実行予算明細
  - name: dashboard
    description: ダッシュボード・集計
  - name: invoices
    description: 請求管理
  - name: purchase-orders
    description: 発注書管理
  - name: purchase-invoices
    description: 仕入伝票管理
  - name: vendor-invoices
    description: 仕入先請求書管理

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: 工事一覧取得
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [planning, active, completed, suspended]
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: 工事一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: 工事登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: 工事登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: 工事詳細取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 工事詳細
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProject
      tags: [projects]
      summary: 工事更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: 工事更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: 工事削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

  /projects/{id}/summary:
    get:
      operationId: getProjectSummary
      tags: [projects]
      summary: 工事収支サマリ取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 工事収支サマリ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"

  /cost-items:
    get:
      operationId: listCostItems
      tags: [cost-items]
      summary: 原価項目一覧取得
      parameters:
        - in: query
          name: projectId
          required: true
          schema:
            type: integer
        - in: query
          name: category
          schema:
            type: string
            enum: [material, labor, subcontract, expense]
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: 原価項目一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItemListResponse"
    post:
      operationId: createCostItem
      tags: [cost-items]
      summary: 原価項目登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCostItemRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"

  /cost-items/{id}:
    put:
      operationId: updateCostItem
      tags: [cost-items]
      summary: 原価項目更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCostItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostItem"
    delete:
      operationId: deleteCostItem
      tags: [cost-items]
      summary: 原価項目削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

  /budgets:
    get:
      operationId: listBudgets
      tags: [budgets]
      summary: 予算一覧取得
      parameters:
        - in: query
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 予算一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetListResponse"
    post:
      operationId: createBudget
      tags: [budgets]
      summary: 予算登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /budgets/{id}:
    put:
      operationId: updateBudget
      tags: [budgets]
      summary: 予算更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBudgetRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /projects/{id}/budget-items:
    get:
      operationId: listBudgetItems
      tags: [budget-items]
      summary: 実行予算明細一覧取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 実行予算明細一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetItemListResponse"
    post:
      operationId: createBudgetItem
      tags: [budget-items]
      summary: 実行予算明細登録
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetItemRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetItem"

  /projects/{id}/budget-items/bulk-create-purchase-orders:
    post:
      operationId: bulkCreatePurchaseOrders
      tags: [budget-items]
      summary: 実行予算明細から発注書一括作成
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreatePurchaseOrdersRequest"
      responses:
        "201":
          description: 一括作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreatePurchaseOrdersResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: 既に発注済みの明細が含まれる
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/budget-items/{itemId}:
    put:
      operationId: updateBudgetItem
      tags: [budget-items]
      summary: 実行予算明細更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBudgetItemRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBudgetItem
      tags: [budget-items]
      summary: 実行予算明細削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [dashboard]
      summary: ダッシュボード概要取得
      responses:
        "200":
          description: ダッシュボード概要
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /dashboard/cost-by-category:
    get:
      operationId: getCostByCategory
      tags: [dashboard]
      summary: カテゴリ別原価集計
      parameters:
        - in: query
          name: projectId
          schema:
            type: integer
      responses:
        "200":
          description: カテゴリ別原価
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostByCategoryResponse"

  /dashboard/monthly-costs:
    get:
      operationId: getMonthlyCosts
      tags: [dashboard]
      summary: 月別原価推移取得
      parameters:
        - in: query
          name: projectId
          schema:
            type: integer
        - in: query
          name: year
          schema:
            type: integer
      responses:
        "200":
          description: 月別原価推移
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyCostsResponse"

  /dashboard/budget-vs-actual:
    get:
      operationId: getBudgetVsActual
      tags: [dashboard]
      summary: 予算実績対比取得
      parameters:
        - in: query
          name: projectId
          schema:
            type: integer
      responses:
        "200":
          description: 予算実績対比
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BudgetVsActualResponse"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: 請求書一覧取得
      responses:
        "200":
          description: 請求書一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceListResponse"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: 請求書作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: 請求書詳細取得
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 請求書詳細（明細・入金・出来高KPI含む）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
    patch:
      operationId: updateInvoice
      tags: [invoices]
      summary: 請求書更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: 請求書削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

  /invoices/{id}/items:
    post:
      operationId: saveInvoiceItems
      tags: [invoices]
      summary: 請求明細一括保存（全削除→再登録）
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: "#/components/schemas/InvoiceItemInput"
              required:
                - items
      responses:
        "200":
          description: 保存成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/InvoiceItem"
                required:
                  - items

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: 得意先一覧取得
      responses:
        "200":
          description: 得意先一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientListResponse"
    post:
      operationId: createClient
      tags: [clients]
      summary: 得意先登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientRequest"
      responses:
        "201":
          description: 得意先登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    put:
      operationId: updateClient
      tags: [clients]
      summary: 得意先更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientRequest"
      responses:
        "200":
          description: 得意先更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: 得意先削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

  /vendor-invoices:
    get:
      operationId: listVendorInvoices
      tags: [vendor-invoices]
      summary: 仕入先請求書一覧
      parameters:
        - in: query
          name: vendorId
          schema:
            type: integer
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: integer
      responses:
        "200":
          description: 一覧取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorInvoiceListResponse"
    post:
      operationId: createVendorInvoice
      tags: [vendor-invoices]
      summary: 仕入先請求書登録
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorInvoiceRequest"
      responses:
        "201":
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorInvoice"

  /vendor-invoices/reconciliation:
    get:
      operationId: getVendorInvoiceReconciliation
      tags: [vendor-invoices]
      summary: 突合確認表（仕入入力合計 vs 請求金額）
      parameters:
        - in: query
          name: year
          required: true
          schema:
            type: integer
        - in: query
          name: month
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 突合集計結果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorInvoiceReconciliationResponse"

  /vendor-invoices/{id}:
    patch:
      operationId: updateVendorInvoice
      tags: [vendor-invoices]
      summary: 仕入先請求書更新
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorInvoiceRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorInvoice"
    delete:
      operationId: deleteVendorInvoice
      tags: [vendor-invoices]
      summary: 仕入先請求書削除
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        code:
          type: string
      required:
        - message

    Project:
      type: object
      properties:
        id:
          type: integer
        projectCode:
          type: string
          description: 工事番号
        name:
          type: string
          description: 工事名称
        clientName:
          type: string
          description: 発注者名
        location:
          type: string
          description: 工事場所
        contractAmount:
          type: number
          description: 請負金額（円）
        status:
          type: string
          enum: [planning, active, completed, suspended]
          description: 工事状態
        startDate:
          type: string
          format: date
          description: 着工日
        endDate:
          type: string
          format: date
          description: 竣工予定日
        completedDate:
          type: string
          format: date
          nullable: true
          description: 竣工日
        description:
          type: string
          nullable: true
          description: 備考
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shortName:
          type: string
          nullable: true
          description: 工事略称
        estimateNumber:
          type: string
          nullable: true
          description: 見積番号
        orderType:
          type: string
          nullable: true
          description: 受注区分（元請/下請 等）
        orderDate:
          type: string
          format: date
          nullable: true
          description: 受注日
        taxRate:
          type: number
          nullable: true
          description: 消費税率（%）
        taxExcludedAmount:
          type: number
          nullable: true
          description: 税抜金額
        taxAmount:
          type: number
          nullable: true
          description: 消費税額
        taxIncludedAmount:
          type: number
          nullable: true
          description: 税込金額
        overview:
          type: string
          nullable: true
          description: 工事概要
        department:
          type: string
          nullable: true
          description: 工事部門
        salesStaff:
          type: string
          nullable: true
          description: 営業担当
        siteManager:
          type: string
          nullable: true
          description: 工事担当
        category1:
          type: string
          nullable: true
          description: 工事分類1
        category2:
          type: string
          nullable: true
          description: 工事分類2
        category3:
          type: string
          nullable: true
          description: 工事分類3
        handoverDate:
          type: string
          format: date
          nullable: true
          description: 引渡予定日
        progressRate:
          type: integer
          nullable: true
          description: 進捗率（%）
        recognitionBasis:
          type: string
          nullable: true
          description: 計上基準
        projectCodeBranch:
          type: string
          nullable: true
          description: 工事コード枝番
        startDateActual:
          type: string
          format: date
          nullable: true
          description: 着工日（実施）
        endDateActual:
          type: string
          format: date
          nullable: true
          description: 竣工日（実施）
        handoverDateActual:
          type: string
          format: date
          nullable: true
          description: 引渡日（実施）
        floorAreaTsubo:
          type: number
          nullable: true
          description: 床面積（坪）
        floorAreaSqm:
          type: number
          nullable: true
          description: 床面積（㎡）
        memo:
          type: string
          nullable: true
          description: メモ
        isCompleted:
          type: boolean
          nullable: true
          description: 完成フラグ
        contractLines:
          type: array
          nullable: true
          description: 請負金額明細（最大8行）
          items:
            $ref: "#/components/schemas/ContractLine"
        publicPrivateType:
          type: string
          nullable: true
          description: 公共/民間区分
        clientCode:
          type: string
          nullable: true
          description: 得意先コード
        constructionHistoryType:
          type: string
          nullable: true
          description: 工事経歴書種類
        constructionHistoryEngineer:
          type: string
          nullable: true
          description: 配置技術者名
      required:
        - id
        - projectCode
        - name
        - clientName
        - location
        - contractAmount
        - status
        - startDate
        - endDate
        - createdAt
        - updatedAt

    ProjectDetail:
      allOf:
        - $ref: "#/components/schemas/Project"
        - type: object
          properties:
            totalBudget:
              type: number
              description: 予算合計
            totalActualCost:
              type: number
              description: 実績原価合計
            grossProfit:
              type: number
              description: 粗利額
            grossProfitRate:
              type: number
              description: 粗利率（%）
            costItems:
              type: array
              items:
                $ref: "#/components/schemas/CostItem"
            budgets:
              type: array
              items:
