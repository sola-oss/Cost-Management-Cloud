kind = "web"
previewPath = "/"
title = "原価管理クラウド"
version = "1.0.0"
id = "artifacts/genka-kanri"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20147

[services.development]
run = "pnpm --filter @workspace/genka-kanri run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/genka-kanri", "run", "build" ]
publicDir = "artifacts/genka-kanri/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20147"
BASE_PATH = "/"
